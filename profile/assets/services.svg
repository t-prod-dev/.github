<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="1200" height="160">
  <defs>
    <style>
      @keyframes cardPop {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes borderGlow {
        0%, 100% { opacity: 0.4; }
        50%       { opacity: 0.9; }
      }
      @keyframes iconPulse {
        0%, 100% { transform: scale(1);   opacity: 0.85; }
        50%       { transform: scale(1.12); opacity: 1; }
      }
      .card  { animation: cardPop 0.7s ease-out both; }
      .c1    { animation-delay: 0.1s; }
      .c2    { animation-delay: 0.3s; }
      .c3    { animation-delay: 0.5s; }
      .c4    { animation-delay: 0.7s; }
      .border { animation: borderGlow 3s ease-in-out infinite; }
      .icon   { animation: iconPulse  3s ease-in-out infinite; }
      .i2 { animation-delay: 0.5s; }
      .i3 { animation-delay: 1.0s; }
      .i4 { animation-delay: 1.5s; }
    </style>

    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#161b22"/><stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="cardGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="160" fill="#0d1117"/>

  <!-- Card 1 – AI Strategy -->
  <g class="card c1">
    <rect x="20"  y="16" width="270" height="128" rx="10" fill="url(#g1)"/>
    <rect class="border" x="20" y="16" width="270" height="128" rx="10"
          fill="none" stroke="#58a6ff" stroke-width="1.2"/>
    <!-- Icon: brain/AI circles -->
    <g class="icon" transform="translate(84, 60)" filter="url(#cardGlow)">
      <circle cx="0"  cy="0"  r="14" fill="none" stroke="#58a6ff" stroke-width="2"/>
      <circle cx="0"  cy="0"  r="5"  fill="#58a6ff"/>
      <circle cx="-18" cy="-10" r="5"  fill="none" stroke="#58a6ff" stroke-width="1.5"/>
      <circle cx="18"  cy="-10" r="5"  fill="none" stroke="#58a6ff" stroke-width="1.5"/>
      <circle cx="18"  cy="10"  r="5"  fill="none" stroke="#58a6ff" stroke-width="1.5"/>
      <circle cx="-18" cy="10"  r="5"  fill="none" stroke="#58a6ff" stroke-width="1.5"/>
      <line x1="-5" y1="-4"  x2="-13" y2="-10" stroke="#58a6ff" stroke-width="1.2"/>
      <line x1="5"  y1="-4"  x2="13"  y2="-10" stroke="#58a6ff" stroke-width="1.2"/>
      <line x1="5"  y1="4"   x2="13"  y2="10"  stroke="#58a6ff" stroke-width="1.2"/>
      <line x1="-5" y1="4"   x2="-13" y2="10"  stroke="#58a6ff" stroke-width="1.2"/>
    </g>
    <text x="154" y="54" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
          font-size="15px" font-weight="700" fill="#58a6ff">AI Strategy</text>
    <text x="154" y="74" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
          font-size="11px" fill="#8b949e">Roadmaps &amp; AI adoption</text>
    <text x="154" y="90" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
          font-size="11px" fill="#8b949e">frameworks for the enterprise</text>
  </g>

  <!-- Card 2 – Data Engineering -->
  <g class="card c2">
    <rect x="312" y="16" width="270" height="128" rx="10" fill="url(#g1)"/>
    <rect class="border" x="312" y="16" width="270" height="128" rx="10"
          fill="none" stroke="#3fb950" stroke-width="1.2"/>
    <g class="icon i2" transform="translate(376, 60)" filter="url(#cardGlow)">
      <!-- Data pipeline icon -->
      <rect x="-20" y="-8" width="14" height="16" rx="3" fill="none" stroke="#3fb950" stroke-width="1.8"/>
      <rect x="-2"  y="-8" width="14" height="16" rx="3" fill="none" stroke="#3fb950" stroke-width="1.8"/>
      <rect x="16"  y="-8" width="14" height="16" rx="3" fill="none" stroke="#3fb950" stroke-width="1.8"/>
      <line x1="-6" y1="0" x2="2"  y2="0" stroke="#3fb950" stroke-width="1.8"/>
      <line x1="12" y1="0" x2="20" y2="0" stroke="#3fb950" stroke-width="1.8"/>
      <polygon points="2,-3 2,3 7,0" fill="#3fb950"/>
      <polygon points="20,-3 20,3 25,0" fill="#3fb950"/>
    </g>
    <text x="447" y="54" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
          font-size="15px" font-weight="700" fill="#3fb950">Data Engineering</text>
    <text x="447" y="74" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
          font-size="11px" fill="#8b949e">Scalable pipelines, lakehouses</text>
    <text x="447" y="90" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
          font-size="11px" fill="#8b949e">and real-time data platforms</text>
  </g>

  <!-- Card 3 – ML & Analytics -->
  <g class="card c3">
    <rect x="604" y="16" width="270" height="128" rx="10" fill="url(#g1)"/>
    <rect class="border" x="604" y="16" width="270" height="128" rx="10"
          fill="none" stroke="#a371f7" stroke-width="1.2"/>
    <g class="icon i3" transform="translate(668, 60)" filter="url(#cardGlow)">
      <!-- Chart / analytics icon -->
      <polyline points="-22,12 -10,-4 2,6 14,-14 22,-14"
                fill="none" stroke="#a371f7" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="22" cy="-14" r="3" fill="#a371f7"/>
      <line x1="-22" y1="14" x2="22" y2="14" stroke="#a371f7" stroke-width="1.5"/>
      <line x1="-22" y1="14" x2="-22" y2="-16" stroke="#a371f7" stroke-width="1.5"/>
    </g>
    <text x="739" y="54" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
          font-size="15px" font-weight="700" fill="#a371f7">ML &amp; Analytics</text>
    <text x="739" y="74" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
          font-size="11px" fill="#8b949e">Predictive models, dashboards</text>
    <text x="739" y="90" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
          font-size="11px" fill="#8b949e">and business intelligence</text>
  </g>

  <!-- Card 4 – Consulting -->
  <g class="card c4">
    <rect x="896" y="16" width="270" height="128" rx="10" fill="url(#g1)"/>
    <rect class="border" x="896" y="16" width="270" height="128" rx="10"
          fill="none" stroke="#f78166" stroke-width="1.2"/>
    <g class="icon i4" transform="translate(960, 60)" filter="url(#cardGlow)">
      <!-- Consulting / people icon -->
      <circle cx="-10" cy="-8" r="7"  fill="none" stroke="#f78166" stroke-width="1.8"/>
      <circle cx="10"  cy="-8" r="7"  fill="none" stroke="#f78166" stroke-width="1.8"/>
      <path d="M-22,16 Q-22,2 -10,2 Q0,2 0,10" fill="none" stroke="#f78166" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M22,16 Q22,2 10,2 Q0,2 0,10"    fill="none" stroke="#f78166" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <text x="1031" y="54" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
          font-size="15px" font-weight="700" fill="#f78166">Consulting</text>
    <text x="1031" y="74" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
          font-size="11px" fill="#8b949e">Expert guidance on digital</text>
    <text x="1031" y="90" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
          font-size="11px" fill="#8b949e">transformation &amp; data culture</text>
  </g>
</svg>
