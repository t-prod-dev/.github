<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <style>
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulseNode {
        0%, 100% { opacity: 0.65; }
        50%       { opacity: 1; }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.12; }
        50%       { opacity: 0.32; }
      }
      @keyframes dashFlow {
        to { stroke-dashoffset: -24; }
      }
      @keyframes scanLine {
        0%   { transform: translateY(-4px); opacity: 0; }
        5%   { opacity: 0.45; }
        95%  { opacity: 0.45; }
        100% { transform: translateY(324px); opacity: 0; }
      }
      @keyframes textGlow {
        0%, 100% { filter: drop-shadow(0 0 8px rgba(88,166,255,0.55)); }
        50%       { filter: drop-shadow(0 0 22px rgba(88,166,255,0.9)) drop-shadow(0 0 40px rgba(163,113,247,0.5)); }
      }
      @keyframes blinkCursor {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      .title {
        animation: fadeInUp 1s ease-out 0.2s both, textGlow 3.5s ease-in-out 1.4s infinite;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 74px;
        letter-spacing: -2px;
        fill: url(#titleGrad);
      }
      .subtitle {
        animation: fadeInUp 1s ease-out 0.65s both;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        font-size: 15px;
        fill: #8b949e;
        letter-spacing: 6px;
      }
      .tagline {
        animation: fadeInUp 1s ease-out 1.05s both;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        font-size: 14px;
        fill: #58a6ff;
        letter-spacing: 1px;
        opacity: 0.9;
      }
      .node { animation: pulseNode 2.6s ease-in-out infinite; }
      .bg-glow { animation: glowPulse 4s ease-in-out infinite; }
      .data-line { stroke-dasharray: 8 5; animation: dashFlow 2.2s linear infinite; }
      .scan { animation: scanLine 5s linear 1.8s infinite; }
      .cursor { animation: blinkCursor 1s step-end infinite 1.6s; }
    </style>

    <!-- Background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="50%"  stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Title gradient (animates hue) -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#58a6ff">
        <animate attributeName="stop-color"
          values="#58a6ff;#a371f7;#79c0ff;#58a6ff"
          dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a371f7">
        <animate attributeName="stop-color"
          values="#a371f7;#f78166;#a371f7;#a371f7"
          dur="7s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Node glow filter -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft text glow -->
    <filter id="softGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Center radial glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>

    <!-- Scan line gradient -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="bounds"><rect width="1200" height="320"/></clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <ellipse class="bg-glow" cx="600" cy="160" rx="420" ry="210" fill="url(#centerGlow)"/>

  <!-- ── Subtle grid ── -->
  <g opacity="0.07" stroke="#58a6ff" stroke-width="0.5" clip-path="url(#bounds)">
    <line x1="120" y1="0" x2="120" y2="320"/><line x1="240" y1="0" x2="240" y2="320"/>
    <line x1="360" y1="0" x2="360" y2="320"/><line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="720" y1="0" x2="720" y2="320"/><line x1="840" y1="0" x2="840" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/><line x1="1080" y1="0" x2="1080" y2="320"/>
    <line x1="0" y1="80"  x2="1200" y2="80"/> <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- ════════════════════════════════════════
       LEFT NEURAL NETWORK
       ════════════════════════════════════════ -->
  <g clip-path="url(#bounds)">
    <!-- edges -->
    <line class="data-line" x1="52"  y1="82"  x2="130" y2="160" stroke="#58a6ff" stroke-width="1"   opacity="0.32" style="animation-delay:0s"/>
    <line class="data-line" x1="52"  y1="238" x2="130" y2="160" stroke="#58a6ff" stroke-width="1"   opacity="0.32" style="animation-delay:.5s"/>
    <line class="data-line" x1="130" y1="160" x2="230" y2="82"  stroke="#a371f7" stroke-width="1"   opacity="0.32" style="animation-delay:.3s"/>
    <line class="data-line" x1="130" y1="160" x2="230" y2="238" stroke="#a371f7" stroke-width="1"   opacity="0.32" style="animation-delay:.7s"/>
    <line class="data-line" x1="52"  y1="82"  x2="230" y2="82"  stroke="#3fb950" stroke-width="0.8" opacity="0.22" style="animation-delay:1s"/>
    <line class="data-line" x1="52"  y1="238" x2="230" y2="238" stroke="#3fb950" stroke-width="0.8" opacity="0.22" style="animation-delay:1.2s"/>
    <line class="data-line" x1="230" y1="82"  x2="340" y2="160" stroke="#58a6ff" stroke-width="1.5" opacity="0.40" style="animation-delay:.2s"/>
    <line class="data-line" x1="230" y1="238" x2="340" y2="160" stroke="#58a6ff" stroke-width="1.5" opacity="0.40" style="animation-delay:.6s"/>
    <!-- extra outer edges -->
    <line class="data-line" x1="18"  y1="160" x2="52"  y2="82"  stroke="#a371f7" stroke-width="0.7" opacity="0.20" style="animation-delay:1.4s"/>
    <line class="data-line" x1="18"  y1="160" x2="52"  y2="238" stroke="#a371f7" stroke-width="0.7" opacity="0.20" style="animation-delay:1.6s"/>

    <!-- nodes -->
    <circle class="node" cx="52"  cy="82"  r="5" fill="#58a6ff" filter="url(#glow)" style="animation-delay:0s"/>
    <circle class="node" cx="52"  cy="238" r="5" fill="#58a6ff" filter="url(#glow)" style="animation-delay:.3s"/>
    <circle class="node" cx="130" cy="160" r="7" fill="#a371f7" filter="url(#glow)" style="animation-delay:.6s"/>
    <circle class="node" cx="230" cy="82"  r="5" fill="#3fb950" filter="url(#glow)" style="animation-delay:.9s"/>
    <circle class="node" cx="230" cy="238" r="5" fill="#3fb950" filter="url(#glow)" style="animation-delay:1.2s"/>
    <circle class="node" cx="340" cy="160" r="8" fill="#58a6ff" filter="url(#glow)" style="animation-delay:.5s"/>
    <circle class="node" cx="18"  cy="160" r="3" fill="#a371f7" filter="url(#glow)" style="animation-delay:1.5s"/>
    <circle class="node" cx="78"  cy="28"  r="3" fill="#3fb950" filter="url(#glow)" style="animation-delay:.2s"/>
    <circle class="node" cx="78"  cy="292" r="3" fill="#3fb950" filter="url(#glow)" style="animation-delay:.8s"/>
    <circle class="node" cx="174" cy="38"  r="3" fill="#f78166" filter="url(#glow)" style="animation-delay:1.1s"/>
    <circle class="node" cx="174" cy="282" r="3" fill="#f78166" filter="url(#glow)" style="animation-delay:.4s"/>
  </g>

  <!-- ════════════════════════════════════════
       RIGHT NEURAL NETWORK  (mirrored)
       ════════════════════════════════════════ -->
  <g clip-path="url(#bounds)">
    <!-- edges -->
    <line class="data-line" x1="1148" y1="82"  x2="1070" y2="160" stroke="#58a6ff" stroke-width="1"   opacity="0.32" style="animation-delay:.2s"/>
    <line class="data-line" x1="1148" y1="238" x2="1070" y2="160" stroke="#58a6ff" stroke-width="1"   opacity="0.32" style="animation-delay:.7s"/>
    <line class="data-line" x1="1070" y1="160" x2="970"  y2="82"  stroke="#a371f7" stroke-width="1"   opacity="0.32" style="animation-delay:.4s"/>
    <line class="data-line" x1="1070" y1="160" x2="970"  y2="238" stroke="#a371f7" stroke-width="1"   opacity="0.32" style="animation-delay:.9s"/>
    <line class="data-line" x1="1148" y1="82"  x2="970"  y2="82"  stroke="#3fb950" stroke-width="0.8" opacity="0.22" style="animation-delay:1.1s"/>
    <line class="data-line" x1="1148" y1="238" x2="970"  y2="238" stroke="#3fb950" stroke-width="0.8" opacity="0.22" style="animation-delay:1.3s"/>
    <line class="data-line" x1="970"  y1="82"  x2="860"  y2="160" stroke="#58a6ff" stroke-width="1.5" opacity="0.40" style="animation-delay:.3s"/>
    <line class="data-line" x1="970"  y1="238" x2="860"  y2="160" stroke="#58a6ff" stroke-width="1.5" opacity="0.40" style="animation-delay:.8s"/>
    <line class="data-line" x1="1182" y1="160" x2="1148" y2="82"  stroke="#a371f7" stroke-width="0.7" opacity="0.20" style="animation-delay:1.5s"/>
    <line class="data-line" x1="1182" y1="160" x2="1148" y2="238" stroke="#a371f7" stroke-width="0.7" opacity="0.20" style="animation-delay:1.7s"/>

    <!-- nodes -->
    <circle class="node" cx="1148" cy="82"  r="5" fill="#58a6ff" filter="url(#glow)" style="animation-delay:.1s"/>
    <circle class="node" cx="1148" cy="238" r="5" fill="#58a6ff" filter="url(#glow)" style="animation-delay:.4s"/>
    <circle class="node" cx="1070" cy="160" r="7" fill="#a371f7" filter="url(#glow)" style="animation-delay:.7s"/>
    <circle class="node" cx="970"  cy="82"  r="5" fill="#3fb950" filter="url(#glow)" style="animation-delay:1.0s"/>
    <circle class="node" cx="970"  cy="238" r="5" fill="#3fb950" filter="url(#glow)" style="animation-delay:1.3s"/>
    <circle class="node" cx="860"  cy="160" r="8" fill="#58a6ff" filter="url(#glow)" style="animation-delay:.6s"/>
    <circle class="node" cx="1182" cy="160" r="3" fill="#a371f7" filter="url(#glow)" style="animation-delay:1.6s"/>
    <circle class="node" cx="1122" cy="28"  r="3" fill="#3fb950" filter="url(#glow)" style="animation-delay:.3s"/>
    <circle class="node" cx="1122" cy="292" r="3" fill="#3fb950" filter="url(#glow)" style="animation-delay:.9s"/>
    <circle class="node" cx="1026" cy="38"  r="3" fill="#f78166" filter="url(#glow)" style="animation-delay:1.2s"/>
    <circle class="node" cx="1026" cy="282" r="3" fill="#f78166" filter="url(#glow)" style="animation-delay:.5s"/>
  </g>

  <!-- ── Connector lines: networks ↔ text ── -->
  <line x1="340" y1="160" x2="425" y2="160" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4 3" opacity="0.35">
    <animate attributeName="opacity" values="0.1;0.55;0.1" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="775" y1="160" x2="860" y2="160" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4 3" opacity="0.35">
    <animate attributeName="opacity" values="0.1;0.55;0.1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </line>
  <circle cx="425" cy="160" r="3" fill="#58a6ff">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="775" cy="160" r="3" fill="#58a6ff">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- ════════════════════════════════════════
       CENTER TEXT
       ════════════════════════════════════════ -->

  <!-- Company name -->
  <text class="title" x="600" y="148" text-anchor="middle" filter="url(#softGlow)"
        font-family="'Segoe UI',system-ui,-apple-system,sans-serif"
        font-weight="800" font-size="74px" letter-spacing="-2px"
        fill="url(#titleGrad)">TPROD DEV</text>

  <!-- Animated underline -->
  <rect y="154" height="2" fill="url(#titleGrad)" rx="1" x="600" width="0">
    <animate attributeName="width" from="0"   to="380" dur="0.9s" fill="freeze" begin="0.6s"/>
    <animate attributeName="x"     from="600" to="410" dur="0.9s" fill="freeze" begin="0.6s"/>
  </rect>

  <!-- Sub-caption -->
  <text class="subtitle" x="600" y="192" text-anchor="middle"
        font-family="'Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="15px" fill="#8b949e" letter-spacing="6px">
    AI · DATA · STRATEGY · SERVICES
  </text>

  <!-- Tagline -->
  <text class="tagline" x="600" y="228" text-anchor="middle"
        font-family="'Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="13.5px" fill="#58a6ff" letter-spacing="1px">
    Transforming Data into Intelligence
  </text>

  <!-- Blinking cursor after tagline -->
  <text class="cursor" x="798" y="228"
        font-family="monospace" font-size="13px" fill="#58a6ff">▌</text>

  <!-- ── Scan line ── -->
  <rect class="scan" x="0" y="0" width="1200" height="4" fill="url(#scanGrad)" clip-path="url(#bounds)"/>
</svg>
